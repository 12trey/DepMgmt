name: Build Deployment Manager

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: win-runner-vm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install client dependencies
        run: |
          cd client
          npm install
          cd ..

      - name: Install dependencies
        run: npm install

      - name: Build Deployment Manager
        run: npm run electron:build

      - name: Create Gitea Release
        uses: akkuman/gitea-release-action@v1
        with:
          # token: ${{ secrets.GITEA_TOKEN }}
          # server_url: ${{ gitea.server_url }}
          # repository: ${{ gitea.repository }}
          tag_name: v1.0.1
          name: Release v1.0.1
          files: |
            dist-electron/Deployment Manager Setup 1.0.1.exe