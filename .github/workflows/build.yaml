name: Build Deployment Manager

on:
    workflow_dispatch:

env:
    GH_TOKEN: ${{ github.token }}
jobs:
    build:
        runs-on: windows-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"
            - name: Get version from package.json
              id: pkg
              run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT
            - name: Install client dependencies
              run: cd client && npm install && cd ..
            - name: Install dependencies
              run: npm install
            - name: Build Deployment Manager
              run: npm run electron:build
              env:
                GH_TOKEN: ${{ github.token }}
            - name: Create GitHub Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                tag_name: v${{ steps.pkg.outputs.version }}
                name: Release v${{ steps.pkg.outputs.version }}
                files: "dist-electron/Deployment Manager Setup ${{ steps.pkg.outputs.version }}.exe"
              env:
                GH_TOKEN: ${{ github.token }}